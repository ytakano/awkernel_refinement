services:
  awkernel_refinement:
    build:
      context: .
      args:
        USERNAME: ${USERNAME}
        UID: ${UID}
        GID: ${GID}
    user: "${UID}:${GID}"
    stdin_open: true
    tty: true
    working_dir: "/awkernel_refinement"
    volumes:
      - "../:/awkernel_refinement"
      - "/run/libvirt:/run/libvirt"
      - "/var/lib/libvirt/images:/var/lib/libvirt/images"
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    group_add:
      - "${LIBVIRT_GID}"
    environment:
      LIBVIRT_DEFAULT_URI: "qemu:///system"
